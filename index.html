<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESL Topic Roulette | Master Combined Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #4a69bd;
      --primary-dark: #1e3799;
      --secondary: #fa983a;
      --secondary-dark: #e55039;
      --accent: #78e08f;
      --accent-dark: #38ada9;
      --bg-color: #f4f6f8;
      --card-bg: #ffffff;
      --text-main: #2f3640;
      --text-light: #718093;
      --font-header: 'Poppins', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 2rem 1rem;
      background-color: var(--bg-color);
      background-image: radial-gradient(#dcdde1 2px, transparent 2px);
      background-size: 30px 30px;
      color: var(--text-main);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* Level Toggle Styles */
    .level-controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 10px;
    }

    .level-tab {
      background: #ced6e0;
      color: #2f3640;
      font-family: var(--font-header);
      font-size: 1.2rem;
      font-weight: 800;
      padding: 10px 25px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      box-shadow: 0 4px 0 #a4b0be;
    }

    .level-tab.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 0 var(--primary-dark);
    }
    
    .level-tab:hover:not(.active) {
      background: #dfe4ea;
      transform: translateY(-2px);
    }

    .level-tab:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 transparent;
    }

    .header {
      text-align: center;
      margin-bottom: 10px;
    }

    .level-badge {
      display: inline-block;
      background: var(--secondary);
      color: white;
      font-family: var(--font-header);
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 10px;
      box-shadow: 0 4px 0 var(--secondary-dark);
    }

    h1 {
      font-family: var(--font-header);
      font-size: 4rem;
      margin: 0;
      color: var(--primary);
      text-transform: uppercase;
      text-shadow: 3px 3px 0px rgba(74, 105, 189, 0.2);
      letter-spacing: 2px;
    }

    .roulette-box {
      background: var(--card-bg);
      border: 5px solid var(--primary);
      border-radius: 20px;
      padding: 60px 20px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
    }

    .category-display {
      font-family: var(--font-header);
      font-size: 3.5rem;
      font-weight: 800;
      color: var(--primary-dark);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .spin-btn-main {
      cursor: pointer;
      background: var(--secondary);
      border: none;
      color: #fff;
      font-family: var(--font-header);
      font-size: 2.5rem;
      font-weight: 800;
      padding: 25px;
      border-radius: 16px;
      text-transform: uppercase;
      transition: all 0.15s ease;
      box-shadow: 0 10px 0 var(--secondary-dark);
      letter-spacing: 2px;
    }

    .spin-btn-main:hover:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 8px 0 var(--secondary-dark);
      filter: brightness(1.1);
    }

    .spin-btn-main:active:not(:disabled) {
      transform: translateY(10px);
      box-shadow: 0 0 0 var(--secondary-dark);
    }

    .spin-btn-main:disabled {
      background: #bdc3c7;
      box-shadow: 0 10px 0 #7f8c8d;
      transform: translateY(0);
      cursor: not-allowed;
      color: #ecf0f1;
    }

    .result-area {
      background: var(--card-bg);
      border: none;
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
      animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(40px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .hidden {
      display: none !important;
    }

    h2 {
      font-family: var(--font-header);
      color: var(--text-main);
      margin-top: 0;
      font-size: 2.4rem;
      line-height: 1.4;
      border-bottom: 4px solid #f1f2f6;
      padding-bottom: 25px;
    }

    /* Basic Layout: Formula Box */
    .formula-box {
      margin: 40px 0;
      background-color: #f0f4ff;
      border-left: 6px solid var(--primary);
      padding: 25px;
      border-radius: 0 16px 16px 0;
    }

    .formula-box h3 {
      color: var(--primary-dark);
      font-size: 1.2rem;
      margin-top: 0;
      margin-bottom: 15px;
      text-transform: uppercase;
      font-family: var(--font-header);
      letter-spacing: 1.5px;
    }

    .formula-text {
      font-size: 1.6rem;
      line-height: 1.6;
      color: var(--text-main);
    }

    .formula-text strong {
      color: var(--primary-dark);
      background: rgba(74, 105, 189, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px dashed var(--primary);
    }

    /* Intermediate Layout: Guidelines & Pictures */
    .guidelines {
      margin: 40px 0;
    }

    .guidelines h3 {
      color: var(--text-light);
      font-size: 1.5rem;
      margin-bottom: 20px;
      text-transform: uppercase;
      font-family: var(--font-header);
      letter-spacing: 1.5px;
    }

    .guidelines ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    .guidelines li {
      margin-bottom: 20px;
      padding-left: 45px;
      position: relative;
      color: var(--primary-dark);
      line-height: 1.5;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .guidelines li::before {
      content: "👉";
      position: absolute;
      left: 0;
      font-size: 1.8rem;
      top: -2px;
    }

    .picture-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    @media (min-width: 600px) {
      .picture-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .pic-placeholder {
      background: #f1f2f6;
      border: 4px dashed #ced6e0;
      height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: var(--font-header);
      font-size: 1.5rem;
      color: #747d8c;
      border-radius: 16px;
      font-weight: 800;
      text-align: center;
      padding: 10px;
    }

    /* Shared Answer Box Styles */
    .answer-btn {
      font-size: 1.5rem;
      padding: 20px;
      background: var(--accent);
      box-shadow: 0 8px 0 var(--accent-dark);
      width: 100%;
      margin-top: 20px;
      color: #1e3799;
      border: none;
      font-family: var(--font-header);
      font-weight: 800;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .answer-btn:hover:not(:disabled) {
      background: #9bdc28;
      box-shadow: 0 6px 0 var(--accent-dark);
      transform: translateY(2px);
    }

    .answer-btn:active:not(:disabled) {
      box-shadow: 0 0 0 var(--accent-dark);
      transform: translateY(8px);
    }

    .answer-box {
      margin-top: 40px;
      padding: 35px 30px;
      background: #fff9c4;
      border-left: 8px solid #f1c40f;
      color: #2c3e50;
      line-height: 1.7;
      font-size: 1.6rem;
      font-weight: 500;
      border-radius: 0 16px 16px 0;
      animation: slideIn 0.3s ease;
      position: relative;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .answer-box::before {
      content: "SAMPLE ANSWER";
      position: absolute;
      top: -16px;
      left: 20px;
      background: #f1c40f;
      color: #000;
      font-family: var(--font-header);
      font-size: 1.1rem;
      padding: 6px 16px;
      font-weight: 800;
      border-radius: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      h1 { font-size: 3rem; }
      .category-display { font-size: 2.5rem; }
      .spin-btn-main { font-size: 1.8rem; padding: 20px; }
      h2 { font-size: 2rem; }
      .formula-text { font-size: 1.4rem; }
      .guidelines li { font-size: 1.3rem; }
      .answer-box { font-size: 1.3rem; padding: 25px; }
      .roulette-box { padding: 40px 15px; }
      .result-area { padding: 30px 20px; }
      .pic-placeholder { height: 120px; font-size: 1rem; }
      .level-tab { font-size: 1rem; padding: 10px 15px;}
    }

    @media (max-width: 480px) {
      h1 { font-size: 2.2rem; }
      .category-display { font-size: 1.8rem; }
      .spin-btn-main { font-size: 1.5rem; }
      h2 { font-size: 1.6rem; }
      .formula-text { font-size: 1.2rem; }
      .guidelines li { font-size: 1.1rem; padding-left: 35px; }
      .guidelines li::before { font-size: 1.4rem; }
      .answer-btn { font-size: 1.2rem; }
      .level-controls { flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="level-controls">
      <button class="level-tab active" id="btn-basic">Basic Level</button>
      <button class="level-tab" id="btn-inter">Intermediate Level</button>
    </div>

    <div class="header">
      <div class="level-badge" id="badge-display">Level 1: Beginner</div>
      <h1 id="main-title">Speaking Test Roulette</h1>
    </div>
    
    <div class="roulette-box" id="roulette-box">
      <div class="category-display" id="category-display">READY TO SPIN</div>
    </div>

    <button class="spin-btn-main" id="spin-btn">
      SPIN!
    </button>

    <div class="result-area hidden" id="result-area">
      <h2 id="scenario-title">Scenario Title</h2>
      
      <div class="formula-box hidden" id="formula-container">
        <h3>👉 Sentence Formula</h3>
        <div class="formula-text" id="formula-text"></div>
      </div>

      <div id="picture-grid" class="picture-grid hidden">
         <div class="pic-placeholder">Pic 1</div>
         <div class="pic-placeholder">Pic 2</div>
         <div class="pic-placeholder">Pic 3</div>
         <div class="pic-placeholder">Pic 4</div>
      </div>
      <div class="guidelines hidden" id="guidelines-container">
        <h3>Guidelines</h3>
        <ul id="guidelines-list"></ul>
      </div>

      <button class="answer-btn" id="answer-btn">
        SHOW SAMPLE ANSWER
      </button>

      <div class="answer-box hidden" id="answer-box"></div>
    </div>
  </div>

  <script>
    // --- MASTER COMBINED DATABASE ---
    const databases = {
      basic: [
        { 
          name: "Self Intro", 
          scenarios: [ 
            { situation: "Can you introduce yourself?", template: "My name is <strong>[name]</strong>, I am <strong>[age]</strong>, and I study at <strong>[school]</strong>.", answer: "My name is Eric, I am 11 years old, and I study at Xindian Elementary School." } 
          ] 
        },
        { 
          name: "Daily Routine", 
          scenarios: [ 
            { situation: "What is your daily routine?", template: "I wake up at <strong>[time]</strong>, eat breakfast, and go to school at <strong>[time]</strong>. After school, I <strong>[activity]</strong>, and I usually go to bed at <strong>[time]</strong>.", answer: "I wake up at 6:30 AM, eat breakfast, and go to school at 7:20 AM. After school, I play basketball, and I usually go to bed at 9:30 PM." },
            { situation: "What is your morning routine?", template: "First, I wake up at <strong>[time]</strong>. Then, I <strong>[activity]</strong> and eat <strong>[food]</strong> for breakfast. Finally, I go to school at <strong>[time]</strong>.", answer: "First, I wake up at 6:00 AM. Then, I brush my teeth and eat a sandwich for breakfast. Finally, I go to school at 7:00 AM." },
            { situation: "What is your daily routine on weekends?", template: "I wake up at <strong>[time]</strong>, eat breakfast, and <strong>[activity]</strong>. In the afternoon, I <strong>[activity]</strong>, and I usually go to bed at <strong>[time]</strong>.", answer: "I wake up at 9:00 AM, eat breakfast, and watch TV. In the afternoon, I go to the park, and I usually go to bed at 10:00 PM." }
          ] 
        },
        { 
          name: "Family", 
          scenarios: [ 
            { situation: "Can you describe your family?", template: "There are <strong>[number]</strong> people in my family. My <strong>[relation]</strong> is a <strong>[job/hobby]</strong>. We like to <strong>[family activity]</strong> together.", answer: "There are 4 people in my family. My mother is a teacher. We like to watch movies together on the weekend." },
            { situation: "Do you have any brothers or sisters?", template: "I have <strong>[number]</strong> <strong>[brother/sister]</strong>. <strong>[He/She]</strong> is <strong>[age]</strong> years old. We like to <strong>[activity]</strong> together.", answer: "I have one older brother. He is 15 years old. We like to play video games together." },
            { situation: "Who do you live with?", template: "I live with my <strong>[family members]</strong>. My <strong>[relation]</strong> is very <strong>[adjective]</strong>. On weekends, we <strong>[activity]</strong>.", answer: "I live with my parents and my grandmother. My grandmother is very kind. On weekends, we go to the night market." }
          ] 
        },
        { 
          name: "Hobbies", 
          scenarios: [ 
            { situation: "What are your hobbies?", template: "I like <strong>[hobby]</strong> because it is <strong>[reason]</strong>. I usually do it <strong>[how often]</strong>. It makes me feel <strong>[emotion]</strong>.", answer: "I like riding my bicycle because it is fun. I usually do it every Sunday. It makes me feel very happy." },
            { situation: "What do you like to do in your free time?", template: "In my free time, I like to <strong>[activity]</strong>. I play with my <strong>[person]</strong> at the <strong>[place]</strong>. It is very <strong>[adjective]</strong>.", answer: "In my free time, I like to play badminton. I play with my dad at the park. It is very exciting." },
            { situation: "Do you prefer reading or drawing?", template: "I prefer <strong>[hobby]</strong>. I usually <strong>[action]</strong> about <strong>[topic]</strong>. It helps me <strong>[reason]</strong>.", answer: "I prefer reading. I usually read books about animals. It helps me learn new things." }
          ] 
        },
        { 
          name: "School Life", 
          scenarios: [ 
            { situation: "What do you like about your school?", template: "I like my school because the teachers are <strong>[adjective]</strong>, and my classmates are <strong>[adjective]</strong>. My favorite activity is <strong>[activity]</strong>.", answer: "I like my school because the teachers are kind, and my classmates are funny. My favorite activity at school is playing games in P.E. class." },
            { situation: "What is your favorite subject at school?", template: "My favorite subject is <strong>[subject]</strong> because it is <strong>[adjective]</strong>. My teacher, <strong>[Teacher's Name]</strong>, is very <strong>[adjective]</strong>.", answer: "My favorite subject is art because it is fun. My teacher, Mr. Lin, is very funny." },
            { situation: "What do you do during break time?", template: "During break time, I usually <strong>[activity]</strong> with my <strong>[friends/classmates]</strong>. We like to <strong>[activity]</strong>. It makes me feel <strong>[emotion]</strong>.", answer: "During break time, I usually chat with my friends. We like to walk around the school. It makes me feel relaxed." }
          ] 
        },
        { 
          name: "Favorites", 
          scenarios: [ 
            { situation: "What is your favorite food?", template: "My favorite food is <strong>[name]</strong>. I like it because <strong>[reason]</strong>.", answer: "My favorite food is beef noodles. I like it because the soup is delicious and warm." }, 
            { situation: "What is your favorite movie?", template: "My favorite movie is <strong>[name]</strong>. I like it because <strong>[reason]</strong>.", answer: "My favorite movie is Spider-Man. I like it because the action scenes are very cool." },
            { situation: "What is your favorite animal?", template: "My favorite animal is the <strong>[animal]</strong>. I like it because it is <strong>[adjective]</strong> and can <strong>[action]</strong>.", answer: "My favorite animal is the dog. I like it because it is cute and can run fast." },
            { situation: "What is your favorite color?", template: "My favorite color is <strong>[color]</strong>. I like it because it reminds me of <strong>[thing]</strong>. It makes me feel <strong>[emotion]</strong>.", answer: "My favorite color is blue. I like it because it reminds me of the ocean. It makes me feel calm." }
          ] 
        },
        { 
          name: "Past Exp.", 
          scenarios: [ 
            { situation: "Can you talk about a memorable day?", template: "One memorable day was <strong>[day/event]</strong>. I did <strong>[activity]</strong>, and I felt <strong>[emotion]</strong>. It was special because <strong>[reason]</strong>.", answer: "One memorable day was my 10th birthday. I ate a big chocolate cake, and I felt so excited. It was special because all my friends came to my house." },
            { situation: "What did you do last weekend?", template: "Last weekend, I went to <strong>[place]</strong> with my <strong>[family/friends]</strong>. We <strong>[activity]</strong> and ate <strong>[food]</strong>. It was a <strong>[adjective]</strong> day.", answer: "Last weekend, I went to the zoo with my family. We saw elephants and ate ice cream. It was a happy day." },
            { situation: "Tell me about a fun trip you took.", template: "Last year, I traveled to <strong>[place]</strong>. The weather was <strong>[adjective]</strong>. I loved <strong>[activity]</strong> there.", answer: "Last year, I traveled to Kenting. The weather was hot and sunny. I loved swimming in the ocean there." }
          ] 
        },
        { 
          name: "Future", 
          scenarios: [ 
            { situation: "What do you want to do in the future?", template: "In the future, I want to be a <strong>[job]</strong> because <strong>[reason]</strong>. I plan to study <strong>[subject]</strong> to achieve my goal.", answer: "In the future, I want to be a computer programmer because I love playing games. I plan to study math and English to achieve my goal." },
            { situation: "Where do you want to live when you grow up?", template: "When I grow up, I want to live in <strong>[city/country]</strong>. I think it is a <strong>[adjective]</strong> place. I want to <strong>[activity]</strong> there.", answer: "When I grow up, I want to live in Tokyo. I think it is a cool place. I want to eat delicious ramen there." },
            { situation: "What is a new skill you want to learn?", template: "I want to learn how to <strong>[skill]</strong>. I think it will be <strong>[adjective]</strong>. I plan to practice <strong>[when/how often]</strong>.", answer: "I want to learn how to play the guitar. I think it will be very cool. I plan to practice every weekend." }
          ] 
        },
        { 
          name: "Traveling", 
          scenarios: [ 
            { situation: "Have you ever traveled to another country?", template: "<strong>Yes</strong>, I have been to <strong>[country]</strong>. I visited <strong>[place]</strong>, and I liked <strong>[experience]</strong>.", answer: "Yes, I have been to Japan. I visited Tokyo, and I liked eating sushi and buying toys." }, 
            { situation: "Have you ever traveled to another country?", template: "<strong>No</strong>, I haven't, but I would like to visit <strong>[country]</strong> because <strong>[reason]</strong>.", answer: "No, I haven't, but I would like to visit America because I want to see a real NBA basketball game." },
            { situation: "What do you like to do when you travel?", template: "When I travel, I like to <strong>[activity 1]</strong> and <strong>[activity 2]</strong>. My favorite part is trying new <strong>[things/food]</strong>.", answer: "When I travel, I like to take photos and buy souvenirs. My favorite part is trying new local food." },
            { situation: "How do you usually travel to other cities?", template: "I usually travel by <strong>[transportation]</strong> with my <strong>[people]</strong>. The trip takes about <strong>[time]</strong>. It is very <strong>[adjective]</strong>.", answer: "I usually travel by High Speed Rail with my parents. The trip takes about two hours. It is very fast and comfortable." }
          ] 
        },
        { 
          name: "Opinions", 
          scenarios: [ 
            { situation: "What do you think about playing mobile games?", template: "I think <strong>[topic]</strong> is <strong>[opinion]</strong>. For example, <strong>[reason/example]</strong>.", answer: "I think playing mobile games is very relaxing. For example, I play with my friends after I finish my homework." },
            { situation: "Do you think English is important?", template: "Yes, I think English is very <strong>[adjective]</strong>. If I speak English, I can <strong>[reason/action]</strong>. It is also helpful for <strong>[reason]</strong>.", answer: "Yes, I think English is very important. If I speak English, I can make foreign friends. It is also helpful for watching movies." },
            { situation: "What do you think about fast food?", template: "I think fast food is <strong>[opinion]</strong>. It tastes <strong>[adjective]</strong>, but it is not very <strong>[adjective]</strong> for my body. I only eat it <strong>[how often]</strong>.", answer: "I think fast food is okay. It tastes delicious, but it is not very healthy for my body. I only eat it once a month." }
          ] 
        }
      ],
      intermediate: [
        { 
          name: "Directions", 
          scenarios: [ 
            { situation: "A tourist asks you how to get to Taipei 101 from Taipei Main Station.", guidelines: ["Mention the MRT Red Line.", "Give an estimated time of arrival.", "Mention it is the tallest building in Taiwan."], answer: "You can take the MRT Red Line (Tamsui-Xinyi Line) from Taipei Main Station going towards Xiangshan. It takes about 15 minutes to reach Taipei 101/World Trade Center Station. Once you get out of the station, you'll see the tallest building right next to you!" }, 
            { situation: "Someone wants to visit Chihkan Tower from Tainan Train Station.", guidelines: ["Recommend taking a bus or walking.", "Mention famous local food located nearby.", "Keep a polite and helpful tone."], answer: "From Tainan Train Station, you can take bus number 88 or 99, or it's about a 15-minute walk. Chihkan Tower is a very famous historical site. While you are in the area, I highly recommend trying the local Tainan beef soup!" }, 
            { situation: "A foreign student asks how to get to the closest night market.", guidelines: ["Point out the general direction.", "Tell them what landmarks to look for.", "Suggest a classic night market snack."], answer: "Just go straight down this street, and turn right at the first traffic light. You will see a large traditional temple. The night market is right next to it. You definitely have to try the stinky tofu when you get there!" }, 
            { situation: "A tourist at Ruifang Train Station asks how to get to Jiufen Old Street.", guidelines: ["Mention taking a bus or a taxi.", "Give an estimated travel time.", "Warn them that the mountain road can be winding."], answer: "From Ruifang Station, you can cross the street and take bus number 788 or 965, or you can easily catch a taxi. It takes about 15 to 20 minutes to go up the mountain. Just be careful, because the road is very winding and might make you a little dizzy!" }, 
            { situation: "Someone at Shilin MRT Station asks for directions to the National Palace Museum.", guidelines: ["Direct them to the bus stop.", "Mention the bus number or route.", "Tell them where to get off."], answer: "Walk out of Exit 1 at Shilin MRT Station and head straight to the bus stop on Zhongzheng Road. You can take bus R30 or 255. Ride the bus for about 15 minutes, and get off right at the main entrance of the National Palace Museum." },
            { situation: "A tourist at Taipei Main Station asks how to get to the Ximending shopping district.", guidelines: ["Mention the MRT Bannan (Blue) Line.", "Tell them which station to get off at.", "Mention what they will see when they exit."], answer: "You can take the MRT Bannan Line from Taipei Main Station going towards Dingpu. Ride it for just one stop and get off at Ximen Station. Take Exit 6, and you will see the famous rainbow crosswalk and lots of shops right in front of you!" }, 
            { situation: "A foreigner asks for directions to the nearest hospital or clinic because they have a stomachache.", guidelines: ["Show sympathy for their situation.", "Give clear walking directions using landmarks.", "Suggest bringing their NHI card or passport."], answer: "I'm sorry to hear you're not feeling well. Go straight down this road for two blocks, then turn left at the FamilyMart. You will see a large clinic on your right. Don't forget to bring your passport or NHI card when you go inside!" }

        { 
          name: "Opinions",

            { situation: "What is your favorite mobile game, and why?", guidelines: ["State the game's name clearly.", "Give at least two reasons why you enjoy it.", "Mention how often and with whom you play."], answer: "My favorite mobile game is Arena of Valor. I like it because it requires teamwork and strategy, and the character graphics are really cool. I usually play it with my friends on the weekends for about two hours." }, 
            { situation: "Do you prefer studying online or in a classroom? Why?", guidelines: ["State your preference directly.", "Provide a primary reason for your choice.", "Give a counter-argument recognizing the other side."], answer: "I prefer studying in a classroom. I can focus much better when I am physically with my classmates, and I can ask the teacher questions immediately. Online studying is very convenient, but I get distracted too easily when I'm at home." }, 
            { situation: "What is your opinion on having homework?", guidelines: ["Give a clear opinion (positive, negative, or mixed).", "Explain the benefits or drawbacks.", "Suggest a reasonable amount of homework."], answer: "I think homework is useful for reviewing what we learned, but having too much of it is very stressful. I believe a good amount would be about 30 minutes a day. This way, we still have time for our hobbies or family." }, 
            { situation: "Do you think students should be required to wear school uniforms? Why or why not?", guidelines: ["State your opinion clearly.", "Give a reason related to equality or convenience.", "Provide a counter-argument or an exception."], answer: "I think students should wear uniforms. It is very convenient because I don't have to think about what to wear every morning, and it makes everyone look equal. However, I think we should be allowed to wear our own clothes on special activity days." }, 
            { situation: "What do you think is the best season to live in Taiwan, and why?", guidelines: ["Name your favorite season.", "Mention the weather during that time.", "Describe an activity you enjoy doing in that season."], answer: "In my opinion, autumn is the best season in Taiwan. The weather is no longer too hot, and it is very cool and breezy. I think it is the perfect time to go hiking in the mountains or have a barbecue with friends without sweating too much." },
            { situation: "Do you prefer eating at night markets or at traditional restaurants? Why?", guidelines: ["State your preference clearly.", "Give a reason related to the food, price, or atmosphere.", "Mention a downside to the other option."], answer: "I prefer eating at night markets because I love trying many different kinds of small snacks in one night. It is also usually cheaper and very lively. Restaurants are comfortable, but they can be expensive and sometimes a bit too formal for me." }, 
            { situation: "What is your opinion on high school students having part-time jobs?", guidelines: ["State your opinion (positive, negative, or mixed).", "Explain a benefit of working.", "Mention a potential problem or challenge."], answer: "I think having a part-time job is a good idea for high school students. It teaches them how to manage money and take on responsibility. However, they need to be careful not to work too many hours, or it might negatively affect their school grades." }
          ]

        { 
          name: "Recommendations", 
          scenarios: [ 
            { situation: "Recommend a place to travel in Taiwan for a 3-day trip.", guidelines: ["Name the destination city or region.", "Mention two specific activities to do there.", "Explain why it is a good choice for tourists."], answer: "I highly recommend visiting Hualien for a 3-day trip. You can visit Taroko Gorge to see the beautiful marble canyons, and go to the Dongdamen Night Market for great seafood. It's a very relaxing place with lots of beautiful nature." }, 
            { situation: "Recommend a good restaurant to celebrate a birthday with friends.", guidelines: ["State the name and type of restaurant.", "Mention the atmosphere or service.", "Suggest a specific food item to order."], answer: "I recommend Din Tai Fung. It has a great atmosphere and the customer service is excellent for celebrations. You absolutely must order their famous pork soup dumplings (Xiaolongbao). It's a perfect place to celebrate a birthday with friends!" }, 
            { situation: "Recommend a Taiwanese street food to a foreigner who has never been here.", guidelines: ["Name the specific street food.", "Describe its taste and texture.", "Tell them where they can buy it easily."], answer: "You have to try Bubble Tea! It's a sweet, icy milk tea with chewy tapioca balls at the bottom. It's very refreshing, especially in the hot summer. You can find bubble tea shops on almost every street corner in Taiwan." }, 
            { situation: "Recommend a traditional Taiwanese souvenir for a foreign friend to take home.", guidelines: ["Name the souvenir.", "Describe what it tastes or looks like.", "Mention where they can easily buy it."], answer: "I strongly recommend buying pineapple cakes to take home. They are a famous Taiwanese pastry with a buttery, crumbly crust and a sweet, chewy pineapple filling inside. You can buy them at bakeries, airports, or even souvenir shops in Taipei Main Station." }, 
            { situation: "Recommend a place for a short weekend hike near the city.", guidelines: ["Name the hiking trail or mountain.", "Describe the difficulty level.", "Mention what kind of view they will see at the top."], answer: "You should go hike Elephant Mountain (Xiangshan) in Taipei. It is very easy to get to by MRT, and the hike only takes about 20 to 30 minutes, though it has lots of stairs! When you reach the top, you get the absolute best view of Taipei 101 and the city skyline." },
            { situation: "A tourist wants to try a popular Taiwanese drink besides regular Bubble Tea. What do you recommend?", guidelines: ["Name a specific drink.", "Describe what ingredients are in it.", "Tell them what sugar or ice level to order."], answer: "I highly recommend trying Winter Melon Tea with lemon. It is a traditional Taiwanese drink that is sweet, a little sour, and very refreshing on a hot day. You should order it with normal ice, but ask for less sugar so it isn't too sweet!" }, 
            { situation: "Recommend a good place in New Taipei City for a family to spend the weekend.", guidelines: ["Name a specific location or district.", "Mention an activity suitable for children and adults.", "Describe the atmosphere or scenery."], answer: "I recommend going to Bitan Scenic Area in Xindian. It is a wonderful place for families. You can rent a swan boat and paddle on the river, or just walk along the beautiful suspension bridge. The atmosphere is very peaceful and scenic." }
          ] 
        },
        { 
          name: "Instructions", 
          scenarios: [ 
            { situation: "Explain how to make a simple homemade sandwich.", guidelines: ["Use proper sequence words (First, Next, Then, Finally).", "Mention bread and at least 3 fillings.", "Keep the steps simple and clear."], answer: "First, take two slices of bread. Next, spread some butter or mayonnaise on them. Then, add some ham, cheese, and a piece of lettuce. Finally, put the two slices together and cut the sandwich in half. Enjoy your meal!" }, 
            { situation: "Explain the process of baking a simple cake.", guidelines: ["Use sequence words for flow.", "Mention mixing the dry and wet ingredients.", "Mention baking time and temperature."], answer: "First, mix flour, sugar, and eggs together in a big bowl. Next, stir in some warm milk and melted butter. Then, slowly pour the batter into a cake pan. Finally, bake it in the oven at 180 degrees for about 30 minutes." }, 
            { situation: "Explain how to order a pizza over the phone.", guidelines: ["Start by greeting the staff.", "State your specific food order clearly.", "Provide necessary delivery details."], answer: "First, say 'Hello, I'd like to order a pizza for delivery, please.' Next, tell them you want a large pepperoni pizza with extra cheese. Then, give them your home address and your phone number. Finally, politely ask them how long it will take." }, 
            { situation: "Explain how to cook a bowl of Taiwanese instant noodles.", guidelines: ["Use sequence words (First, Next, Then, Finally).", "Mention boiling water.", "Explain when to add the flavor packets."], answer: "First, boil some water in a pot. Next, open the instant noodle package and put the dry noodles into the boiling water. Then, open the flavor packets and stir them into the soup. Finally, let it cook for about three minutes, pour it into a bowl, and it is ready to eat!" }, 
            { situation: "Explain how to buy a single-journey token at an MRT ticket machine.", guidelines: ["Start with selecting the language or destination.", "Mention inserting money or coins.", "Explain what the machine will dispense."], answer: "First, look at the screen on the ticket machine and select your destination station or the ticket price. Next, insert your coins or a banknote into the correct slot. Then, wait a moment for the machine to process. Finally, take your blue plastic token and any change from the tray at the bottom." },
            { situation: "Explain how to rent and return a YouBike using an EasyCard.", guidelines: ["Explain how to unlock the bike.", "Mention adjusting the seat before riding.", "Explain the return process."], answer: "First, place your registered EasyCard on the sensor panel of the YouBike dock to unlock it. Next, pull the bike out and adjust the seat to your height. After you finish riding, push the bike firmly back into an empty dock and tap your card again to pay." }, 
            { situation: "Explain the basic steps to make bubble tea at home.", guidelines: ["Mention boiling the tapioca pearls.", "Explain how to prepare the tea.", "Describe the final assembly."], answer: "First, boil the tapioca pearls in hot water until they are soft and chewy, then mix them with some brown sugar. Next, brew a strong cup of black tea and let it cool down. Finally, put the pearls in a glass, add the tea, pour in some milk, and add ice cubes." }
          ]

            { situation: "Describe this sequence of events: Cooking a fried egg.", guidelines: ["Describe Picture 1: Getting an egg from the fridge.", "Describe Picture 2: Turning on the stove.", "Describe Picture 3: Cracking the egg into a frying pan.", "Describe Picture 4: Eating the fried egg."], answer: "First, a man gets a fresh egg out of his refrigerator. Next, he turns on the kitchen stove and puts a little oil in the frying pan. Then, he carefully cracks the egg into the hot pan. Finally, he is sitting down at the dining table, happily eating his fried egg.", requiresPictures: true },

    // --- STATE ---
    let currentLevel = 'basic'; // defaults to basic

    // --- DOM ELEMENTS ---
    const btnBasic = document.getElementById('btn-basic');
    const btnInter = document.getElementById('btn-inter');
    const badgeDisplay = document.getElementById('badge-display');
    const mainTitle = document.getElementById('main-title');
    
    const spinBtn = document.getElementById('spin-btn');
    const answerBtn = document.getElementById('answer-btn');
    const resultArea = document.getElementById('result-area');
    const answerBox = document.getElementById('answer-box');
    const catDisplay = document.getElementById('category-display');
    const scenarioTitle = document.getElementById('scenario-title');
    
    // Basic Layout Elements
    const formulaContainer = document.getElementById('formula-container');
    const formulaText = document.getElementById('formula-text');

    // Intermediate Layout Elements
    const pictureGrid = document.getElementById('picture-grid');
    const guidelinesContainer = document.getElementById('guidelines-container');
    const guidelinesList = document.getElementById('guidelines-list');

    // --- LEVEL TOGGLE LOGIC ---
    function setLevel(level) {
      currentLevel = level;
      
      // Update Tab Visuals
      if (level === 'basic') {
        btnBasic.classList.add('active');
        btnInter.classList.remove('active');
        badgeDisplay.textContent = "Level 1: Beginner";
        badgeDisplay.style.background = "var(--secondary)"; // orange
      } else {
        btnInter.classList.add('active');
        btnBasic.classList.remove('active');
        badgeDisplay.textContent = "Level 2: Intermediate";
        badgeDisplay.style.background = "var(--primary-dark)"; // dark blue
      }

      // Hide results and reset roulette
      resultArea.classList.add('hidden');
      catDisplay.textContent = "READY TO SPIN";
      spinBtn.textContent = "SPIN!";
    }

    btnBasic.addEventListener('click', () => setLevel('basic'));
    btnInter.addEventListener('click', () => setLevel('intermediate'));

    // --- ROULETTE LOGIC ---
    spinBtn.addEventListener('click', () => {
      // 1. Reset UI
      resultArea.classList.add('hidden');
      answerBox.classList.add('hidden');
      answerBtn.textContent = `SHOW SAMPLE ANSWER`;
      
      // 2. Disable Spin Button
      spinBtn.disabled = true;
      spinBtn.textContent = `SPINNING...`;
      
      let spinCount = 0;
      const maxSpins = 20 + Math.floor(Math.random() * 15);
      let currentDelay = 40; 
      
      const activeDB = databases[currentLevel];

      const spinTick = () => {
        const randomCat = activeDB[Math.floor(Math.random() * activeDB.length)];
        catDisplay.textContent = randomCat.name;
        spinCount++;
        
        // Slower spin near the end
        if(spinCount < maxSpins) {
          if(spinCount > maxSpins * 0.6) { currentDelay += 25; }
          setTimeout(spinTick, currentDelay);
        } else {
          finishSpin(randomCat);
        }
      };
      
      spinTick();
    });

    function finishSpin(finalCategory) {
      spinBtn.disabled = false;
      spinBtn.textContent = `SPIN AGAIN!`;
      
      const scenarios = finalCategory.scenarios;
      const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];
      
      // Update Shared Content
      scenarioTitle.textContent = scenario.situation;
      answerBox.textContent = scenario.answer;
      
      // Render layout based on selected level
      if (currentLevel === 'basic') {
        // Hide intermediate blocks
        pictureGrid.classList.add('hidden');
        guidelinesContainer.classList.add('hidden');
        
        // Show basic blocks
        formulaContainer.classList.remove('hidden');
        formulaText.innerHTML = scenario.template; // Renders <strong> tags
      } 
      else if (currentLevel === 'intermediate') {
        // Hide basic blocks
        formulaContainer.classList.add('hidden');
        
        // Show intermediate blocks
        guidelinesContainer.classList.remove('hidden');
        guidelinesList.innerHTML = '';
        scenario.guidelines.forEach(guidelineText => {
          const li = document.createElement('li');
          li.textContent = guidelineText;
          guidelinesList.appendChild(li);
        });
        
        // Show pictures only if required by scenario
        if(scenario.requiresPictures) {
          pictureGrid.classList.remove('hidden');
        } else {
          pictureGrid.classList.add('hidden');
        }
      }
      
      // Reveal the result board
      resultArea.classList.remove('hidden');
    }

    // --- ANSWER TOGGLE LOGIC ---
    answerBtn.addEventListener('click', () => {
      if (answerBox.classList.contains('hidden')) {
        answerBox.classList.remove('hidden');
        answerBtn.textContent = `HIDE SAMPLE ANSWER`;
      } else {
        answerBox.classList.add('hidden');
        answerBtn.textContent = `SHOW SAMPLE ANSWER`;
      }
    });
  </script>
</body>
